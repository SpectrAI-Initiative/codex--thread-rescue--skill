<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Codex Thread Rescue Logo</title>
  <desc id="desc">Square logo for the Codex Thread Rescue skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="55%" stop-color="#0c2238"/>
      <stop offset="100%" stop-color="#0f3d3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ff2c4"/>
      <stop offset="100%" stop-color="#64c4ff"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eef4fb"/>
      <stop offset="100%" stop-color="#baf8df"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#7ff2c4" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7ff2c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="44" fill="url(#bg)"/>
  <circle cx="356" cy="164" r="124" fill="url(#glow)"/>

  <g transform="translate(76 78)">
    <rect x="0" y="0" width="172" height="172" rx="38" fill="#091a2b" stroke="#7ff2c4" stroke-opacity="0.45" stroke-width="4"/>
    <path d="M112 38H76c-20 0-38 18-38 38v24c0 20 18 38 38 38h36" fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-width="24"/>
    <path d="M112 134H76c-20 0-38 18-38 38v24c0 20 18 38 38 38h36" fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-width="24" transform="translate(0,-58)"/>
    <circle cx="128" cy="82" r="16" fill="#64c4ff"/>
    <circle cx="128" cy="140" r="16" fill="#7ff2c4"/>
  </g>

  <text x="76" y="332" fill="url(#wordmark)" font-family="'SF Pro Display','Segoe UI',Arial,sans-serif" font-size="72" font-weight="800" letter-spacing="4">CODEX</text>
  <text x="76" y="386" fill="#d7f0ff" font-family="'SF Pro Text','Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="3">THREAD RESCUE</text>
</svg>
